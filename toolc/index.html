<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プロンプト生成ツール</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 20px auto;
      padding: 0 15px;
    }
    .field {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    select, textarea, button {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }
    textarea {
      height: 120px;
      margin-top: 10px;
      resize: vertical;
    }
    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h2>プロンプト生成ツール</h2>

  <div class="field">
    <label for="character-select">キャラクター選択</label>
    <select id="character-select">
      <option value="">(選択なし)</option>
    </select>
  </div>

  <button onclick="copyPrompt()">プロンプトを生成してコピー</button>

  <div class="field">
    <textarea id="result" readonly placeholder="ここにプロンプトが出力されます"></textarea>
  </div>

  <script>
    let characterData = [];

    // JSONファイルの読み込み
    fetch('data.json')
      .then(response => response.json())
      .then(data => {
        characterData = data.characters;
        const selectEl = document.getElementById('character-select');
        
        characterData.forEach((char, index) => {
          const option = document.createElement('option');
          option.value = index;
          option.textContent = char.name;
          selectEl.appendChild(option);
        });
      })
      .catch(error => {
        console.error('JSONの読み込みに失敗しました:', error);
        alert('data.json の読み込みに失敗しました。ファイルが同じフォルダにあるか確認してください。');
      });

    // プロンプト生成とコピー処理
    function copyPrompt() {
      const selectEl = document.getElementById('character-select');
      const selectedIndex = selectEl.value;
      const resultArea = document.getElementById('result');

      if (selectedIndex === "") {
        resultArea.value = "";
        return;
      }

      const selectedPrompt = characterData[selectedIndex].prompt;
      resultArea.value = selectedPrompt;

      // クリップボードへコピー
      navigator.clipboard.writeText(selectedPrompt).then(() => {
        alert('クリップボードにコピーしました！');
      }).catch(err => {
        console.error('コピーに失敗しました:', err);
      });
    }
  </script>

</body>
</html>
