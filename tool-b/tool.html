<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目次HTML変換ツール</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<h1>目次HTML変換ツール</h1>

<div class="form-group">
    <label for="input">投稿サイトの目次テキスト（貼り付け）</label>
    <textarea id="input" placeholder="舞台紹介    2025年09月28日(日) 22:39(改)&#10;リシェルにキス    2025年10月02日(木) 21:01(改)"></textarea>
</div>

<button onclick="convert()">変換実行</button>

<h2>出力結果</h2>
<div class="form-group">
    <textarea id="output" readonly></textarea>
</div>

<script>
function convert() {
    const input = document.getElementById('input').value;
    const lines = input.split('\n');
    const result = [];
    let count = 1;

    for (let line of lines) {
        line = line.trim();
        if (!line) continue;

        // タイトル部分の抽出（日付表現の前までを取得）
        let title = line.split(/\s+\d{4}年/)[0].trim();

        // 3桁ゼロ埋めファイル名
        const fileNum = String(count).padStart(3, '0');

        result.push(`<li><a href="${fileNum}.html">${count}. ${title}</a></li>`);
        count++;
    }

    document.getElementById('output').value = result.join('\n');
}
</script>

</body>
</html>
