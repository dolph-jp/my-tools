<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小説HTMLテンプレート生成ツール</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        textarea {
            width: 100%;
            height: 300px;
            margin-top: 10px;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
        }
    </style>
</head>
<body>

<h1>小説HTMLテンプレート生成ツール</h1>

<div class="form-group">
    <label for="title">作品タイトル</label>
    <input type="text" id="title" placeholder="例: 魔法使いの旅">
</div>

<div class="form-group">
    <label for="episode">話数</label>
    <input type="number" id="episode" value="70" min="1">
</div>

<div class="form-group">
    <label for="subtitle">サブタイトル</label>
    <input type="text" id="subtitle" placeholder="例: はじまりの街">
</div>

<button onclick="generateHTML()">HTML生成</button>

<h2>生成結果</h2>
<textarea id="output" readonly></textarea>

<script>
function generateHTML() {
    const title = document.getElementById('title').value;
    const episodeNum = parseInt(document.getElementById('episode').value, 10);
    const subtitle = document.getElementById('subtitle').value;

    if (isNaN(episodeNum) || episodeNum < 1) {
        alert('正しい話数を入力してください。');
        return;
    }

    const currentEpisode = String(episodeNum).padStart(3, '0');
    const prevEpisode = String(episodeNum - 1).padStart(3, '0');
    const nextEpisode = String(episodeNum + 1).padStart(3, '0');

    const prevLink = episodeNum > 1 ? `<a href="${prevEpisode}.html">← 前の話</a>` : '← 前の話';
    const nextLink = `<a href="${nextEpisode}.html">次の話 →</a>`;

    const htmlTemplate = `<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    
    <title>${title} - 第${episodeNum}話</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <h2>第${episodeNum}話：${subtitle}</h2>
    
    <p>
        ${prevLink} | 
        <a href="index.html">目次</a> | 
        ${nextLink}
    </p>

    <hr>
    
    <pre>

（ここに作品本文）

</pre>

    <hr>

    <p>
        ${prevLink} | 
        <a href="index.html">目次</a> | 
        ${nextLink}
    </p>

</div>
</body>
</html>`;

    document.getElementById('output').value = htmlTemplate;
}
</script>

</body>
</html>
